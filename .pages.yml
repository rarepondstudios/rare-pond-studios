media:
  input: media
  output: /media
  extensions: [png, jpg, jpeg, webp, gif, svg, mp4]

content:
  - name: site
    label: Site Settings
    type: file
    path: data/site.json
    fields:
      - name: imageSpecs
        label: "📐 READ ME - image specs for every upload on this site"
        type: text
        readonly: true
        description: "COLOR (applies to EVERY image): export sRGB, 8-bit. Do NOT export Display P3 or Adobe RGB - browsers will render them wrong (usually oversaturated). If you are exporting a frame from a video: video is Rec.709 and usually LIMITED range (16-235); it must be converted to sRGB FULL range (0-255), or blacks look milky and washed out. || SIZES: Film stills 2560x1440 (16:9). Page/feature backgrounds 2560x1440. Project bubbles 1200x1200 square. Team photos 800x800 square. Logos: transparent PNG, 1400 px+. Header duck mark 512x512 PNG. || FORMAT: photos = JPG or WebP (WebP preferred, ~30% smaller). Anything needing transparency = PNG. Keep every file under 600 KB. || NEVER UPSCALE a small image to hit these numbers - it just adds blur and weight. Better a sharp 1600 px file than a soft fake 2560. || Full detail + the stills pipeline: see STILLS.md and README.md in the repo."
      - name: logos
        label: Logos
        type: object
        fields:
          - { name: color, label: Full-color logo (About section), type: image, description: "SPECS: transparent PNG, 1400 px wide or more, under 400 KB. COLOR: export sRGB, 8-bit (not Display P3 / Adobe RGB, or it shifts in browsers)." }
          - { name: footer, label: Footer logo (filled duck + palette), type: image, description: "SPECS: transparent PNG, 1400 px wide or more, under 400 KB. Sits on a dark footer, so it must read light. COLOR: export sRGB, 8-bit (not Display P3 / Adobe RGB, or it shifts in browsers)." }
          - { name: duckMark, label: Duck mark (header icon), type: image, description: "SPECS: transparent PNG, square, 512x512 px, under 150 KB. Shown tiny (about 44 px) - keep it bold and simple. COLOR: export sRGB, 8-bit (not Display P3 / Adobe RGB, or it shifts in browsers)." }
      - { name: water, label: Water / caustics background, type: image, description: "SPECS: JPG or WebP, 2560x1440 px, under 500 KB. Tiles behind the footer/hero - mid-to-dark works best. COLOR: export sRGB, 8-bit (not Display P3 / Adobe RGB, or it shifts in browsers)." }
      - name: hero
        label: Hero
        type: object
        fields:
          - { name: title, label: Headline, type: string }
          - { name: titleEm, label: Headline accent, type: string }
          - { name: subtitle, label: Subtitle, type: text }
      - name: about
        label: About blurb
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: paragraphs, label: Paragraphs, type: text, list: true }
          - { name: button, label: Button text, type: string }
      - name: socials
        label: Social links
        type: object
        list: true
        fields:
          - { name: label, label: Label, type: string }
          - { name: url, label: URL, type: string }
          - { name: icon, label: Icon, type: select, description: "Which logo to draw. yt = YouTube, ig = Instagram, li = LinkedIn, fb = Facebook. Adding a NEW network needs a code change (an SVG + a hover colour) - ask your developer/AI.", options: { values: [yt, ig, li, fb] } }
      - { name: orbits, label: About-logo floating images, type: image, list: true, description: "The little film-still bubbles that orbit the logo. SPECS: square, 600x600 px, JPG, under 200 KB each. They are masked into circles, so keep the subject centred. COLOR: export sRGB, 8-bit (not Display P3 / Adobe RGB, or it shifts in browsers)." }
      - name: header
        label: Header (shared - studio + rentals)
        type: object
        fields:
          - { name: brandLine1, label: Brand - line 1, type: string }
          - { name: brandLine2, label: Brand - line 2 (studio), type: string }
          - { name: navTeam, label: Nav - Team label, type: string }
          - { name: navProjects, label: Nav - Projects label, type: string }
          - { name: navContact, label: Nav - Contact label, type: string }
      - name: sectionHeadings
        label: Section headings (studio)
        type: object
        fields:
          - { name: projectsEyebrow, label: Projects - eyebrow, type: string }
          - { name: projectsHeading, label: Projects - heading, type: string }
          - { name: projectsSub, label: Projects - subtitle, type: text }
          - { name: teamEyebrow, label: Team - eyebrow, type: string }
          - { name: teamHeading, label: Team - heading, type: string }
          - { name: teamSub, label: Team - subtitle, type: text }
          - { name: contactEyebrow, label: Contact - eyebrow, type: string }
          - { name: contactHeading, label: Contact - heading, type: string }
          - { name: contactSub, label: Contact - subtitle, type: text }
      - name: teamCrew
        label: Team page - crew blurb (studio)
        type: object
        fields:
          - { name: blurb, label: Crew blurb, type: text }
          - { name: button, label: Button label, type: string }
      - name: footer
        label: Footer (shared - studio + rentals)
        type: object
        fields:
          - { name: tagline, label: Tagline, type: string }
          - { name: copyrightUrl, label: Copyright link URL, type: string }
          - { name: copyrightUrlText, label: Copyright link text, type: string }
          - { name: copyright, label: Copyright line, type: string }
          - name: links
            label: Footer links
            type: object
            list: true
            fields:
              - { name: label, label: Label, type: string }
              - { name: go, label: In-site target (home/team/projects/contact - blank if external), type: string }
              - { name: href, label: External href (optional), type: string, hidden: true }
      - name: hubspot
        label: Contact form (HubSpot)
        type: object
        fields:
          - { name: portalId, label: Portal ID, type: string }
          - { name: region, label: Region, type: string }
          - { name: formId, label: Form ID, type: string }
      - name: eventBanner
        label: Event banner (front page - studio + rentals)
        type: object
        fields:
          - { name: enabled, label: Show the event banner, type: boolean }
          - { name: title, label: Banner title text, type: string }
          - { name: buttonText, label: Button text, type: string }
          - { name: buttonLink, label: "Button link (URL or /path)", type: string }
          - { name: colorLook, label: Color scheme (from Color Looks), type: select, options: { values: [signature, rainbow, geri, rev, invalid, category-camera, category-lighting, category-grip, category-electric, category-sound] } }
          - { name: gradientStyle, label: "Gradient style - Stream (wide horizontal sweep, best for this banner) or Pinwheel (rotating conic, best for round bubbles)", type: select, options: { values: [stream, pinwheel] } }

  - name: colorlooks
    label: Color Looks
    type: file
    path: data/colorlooks.json
    fields:
      - name: previewUrl
        label: "▶ Live color preview page (open this URL in a new browser tab)"
        type: string
        readonly: true
        description: "Open this link to see every look as live swatches with hex codes. Edit the colors below, commit, then reload that page to compare."
      - name: previewUser
        label: "🔒 Username for that page"
        type: string
        readonly: true
        description: "The page asks for a login. This is the username."
      - name: previewPasswordLocation
        label: "🔑 Password - where to find it"
        type: string
        readonly: true
        description: "On Mac/iPhone/iPad, Safari will autofill the login box for you. Not written down here on purpose: this repo is PUBLIC, so anything typed into Pages CMS is visible to the world. Never put a password, key or token in this CMS."
      - name: looks
        label: Color looks (single source of truth for site colors)
        type: block
        list: true
        blockKey: kind
        blocks:
          # ---- BASICS: always loaded, used across the whole site ----------------
          - name: basics
            label: "Basics (always loaded site-wide)"
            fields:
              - { name: key, label: ID (used by code - do not change), type: string, readonly: true }
              - { name: name, label: Name, type: string }
              - { name: c1, label: Color 1 (hex), type: string }
              - { name: c2, label: Color 2 (hex), type: string }
              - { name: c3, label: Color 3 (hex), type: string }
              - { name: note, label: Note, type: text }

          # ---- RAINBOW: structural, not editable -------------------------------
          - name: rainbow
            label: "Basics: Rainbow (locked - not editable)"
            fields:
              - { name: key, label: ID, type: string, readonly: true }
              - { name: name, label: Name, type: string, readonly: true,
                  description: "This look is LOCKED on purpose. It is not three colors - it is the animated 9-stop conic rainbow gradient (--rainbow in index.html), the one the 'More to come' bubble uses. There is nothing to edit; it is listed here so other places can point at it. You can preview it on the Color Looks page." }

          # ---- PROJECT: a film's entire look. This replaced the old 'Theme'. ----
          - name: project
            label: "Project (a film's page + bubble)"
            fields:
              - { name: key, label: ID (used by code - do not change), type: string, readonly: true }
              - { name: name, label: Name, type: string }
              - { name: project, label: Linked project key, type: string,
                  description: "Must match the project's ID in Projects (e.g. geri, rev, invalid). This is what ties this look to that film." }
              - { name: accent, label: Accent color (hex), type: string,
                  description: "The film's highlight color: kicker text, 'Where to Watch' label, carousel glow." }
              - { name: scrimTint1, label: Background tint 1 (hex), type: string,
                  description: "The colored wash over the film's page background." }
              - { name: scrimTint1Alpha, label: Background tint 1 opacity (0-1), type: number }
              - { name: scrimTint2, label: Background tint 2 (hex, optional), type: string,
                  description: "Second wash. Only some films use one. Leave blank for none." }
              - { name: scrimTint2Alpha, label: Background tint 2 opacity (0-1), type: number }
              - { name: kickerColor, label: Kicker color (hex, optional), type: string,
                  description: "Leave blank to use the Accent color." }
              - { name: kickerTracking, label: "Kicker letter-spacing (e.g. .3em, optional)", type: string,
                  description: "Leave blank for the site default (.24em)." }
              - { name: taglineColor, label: Tagline color (hex, optional), type: string }
              - { name: taglineItalic, label: Tagline in italics, type: boolean }
              - { name: titleStyle, label: Title style, type: select, options: { values: [solid, gradient] },
                  description: "Only applies to a film with NO title logo (it falls back to text). All current films have logos, so this does nothing for them yet." }
              - { name: titleGradientFrom, label: Title gradient - top color (hex), type: string }
              - { name: titleGradientTo, label: Title gradient - bottom color (hex), type: string }
              - { name: note, label: Note, type: text }

          # ---- CATEGORY: rentals section colours --------------------------------
          - name: category
            label: "Rentals category"
            fields:
              - { name: key, label: ID (used by code - do not change), type: string, readonly: true }
              - { name: name, label: Name, type: string }
              - { name: category, label: Linked rentals category, type: string,
                  description: "Must match the category name in the rentals database exactly (e.g. Camera (Red))." }
              - { name: c1, label: Color 1 (hex), type: string, description: "This is the color the category actually uses." }
              - { name: c2, label: Color 2 (hex), type: string }
              - { name: c3, label: Color 3 (hex), type: string }
              - { name: note, label: Note, type: text }

  - name: projects
    label: Projects (bubbles + pages)
    type: file
    path: data/projects.json
    fields:
      - name: projects
        label: Projects
        type: object
        list: true
        fields:
          - { name: key, label: ID (url-safe, e.g. geri), type: string,
              description: "This ID is how the film is linked to its colors. To change this film's look (accent, background tints, kicker, tagline), go to COLOR LOOKS and open the Project entry whose 'Linked project key' matches this ID. There is nothing color-related on this screen." }
          - { name: title, label: Title, type: string }
          - { name: subtitle, label: Card subtitle / genre line, type: string }
          - { name: placeholder, label: Coming-soon placeholder bubble, type: boolean }
          - { name: logoText, label: "↳ Text inside the coming-soon bubble", type: string, description: "Only used when the toggle above is ON. Real films show their Title logo here instead, so this is ignored for them." }
          - { name: bubbleImage, label: Bubble image, type: image, description: "SPECS: square, 1200x1200 px, JPG, under 350 KB. Masked into a circle - keep the subject centred and away from the corners. COLOR: export sRGB, 8-bit (not Display P3 / Adobe RGB, or it shifts in browsers)." }
          - { name: titleLogo, label: Title logo (transparent PNG), type: image, description: "SPECS: transparent PNG, about 1600 px wide, under 500 KB. Must read against a dark background. COLOR: export sRGB, 8-bit (not Display P3 / Adobe RGB, or it shifts in browsers)." }
          - { name: focusBg, label: Feature / page background, type: image, description: "SPECS: JPG or WebP, 2560x1440 px (16:9), under 600 KB. Scaled to cover and darkened behind text - pick something without important detail at the edges. COLOR: export sRGB, 8-bit (not Display P3 / Adobe RGB, or it shifts in browsers)." }
          - { name: cardLogline, label: Carousel logline, type: text }
          - { name: eyebrow, label: Eyebrow, type: string }
          - { name: kicker, label: Kicker, type: string }
          - { name: tagline, label: Tagline, type: string }
          - { name: pageLogline, label: Project-page logline (HTML allowed), type: text }
          - { name: chips, label: Genre chips, type: string, list: true }
          - name: watch
            label: Where to watch
            type: object
            fields:
              - { name: type, label: Type, type: select, options: { values: [festival, post, youtube] } }
              - { name: text, label: Status text, type: string }
              - { name: id, label: YouTube video ID, type: string }
              - { name: url, label: YouTube URL, type: string }
              - { name: ig, label: Instagram handle, type: string }
          - name: stills
            label: Stills gallery
            type: image
            list: true
            description: "SPECS: 16:9, 2560x1440 px, JPG or WebP, under 600 KB. COLOR: export sRGB, 8-bit (not Display P3 / Adobe RGB, or it shifts in browsers). EXPORT FROM THE FILM MASTER, not from a compressed delivery file - and if the master is Rec.709 LIMITED range (16-235), expand it to FULL (0-255) or the blacks come out milky. IMPORTANT: stills you upload here are served exactly as uploaded. The high-resolution responsive versions (the -800/-1600/-2560 files) are generated by the stills pipeline from the ProRes master and listed in data/stills-hd.json - ask your developer/AI to run it for any still you add. See STILLS.md."
          - { name: credits, label: Credits (HTML allowed), type: text }
          - { name: blurb, label: Short blurb, type: text }

  - name: team
    label: Team
    type: file
    path: data/team.json
    fields:
      - name: team
        label: Team members
        type: object
        list: true
        fields:
          - { name: name, label: Name, type: string }
          - { name: role, label: Role, type: string }
          - { name: photo, label: Photo, type: image, description: "SPECS: square, 800x800 px, JPG, under 250 KB. Cropped to a circle - centre the face. COLOR: export sRGB, 8-bit (not Display P3 / Adobe RGB, or it shifts in browsers)." }
          - { name: desc, label: Bio, type: text }

  - name: rentals
    label: Rentals page
    type: file
    path: data/rentals.json
    fields:
      - { name: seoDescription, label: SEO description (search-result blurb), type: text }
      - { name: brandLine1, label: Header brand - line 1, type: string }
      - { name: brandLine2, label: Header brand - line 2 (rentals), type: string }
      - { name: cartEstimateNote, label: Cart estimate note, type: text }
      - name: logos
        label: Rentals logos
        type: object
        fields:
          - { name: headerMark, label: Header duck mark, type: image, description: "SPECS: transparent PNG, square, 512x512 px, under 150 KB. COLOR: export sRGB, 8-bit (not Display P3 / Adobe RGB, or it shifts in browsers)." }
          - { name: footerColor, label: Footer full-color logo, type: image, description: "SPECS: transparent PNG, 1400 px wide or more, under 400 KB. Sits on dark - must read light. COLOR: export sRGB, 8-bit (not Display P3 / Adobe RGB, or it shifts in browsers)." }
          - { name: footerWater, label: Footer water / caustics background, type: image, description: "SPECS: JPG or WebP, 2560x1440 px, under 500 KB. COLOR: export sRGB, 8-bit (not Display P3 / Adobe RGB, or it shifts in browsers)." }
          - { name: homeLogo, label: Home hero logo, type: image, description: "SPECS: transparent PNG, about 1600 px wide, under 500 KB. COLOR: export sRGB, 8-bit (not Display P3 / Adobe RGB, or it shifts in browsers)." }
      - name: home
        label: Home hero copy
        type: object
        fields:
          - { name: heroTitle, label: Hero title, type: string }
          - { name: heroSubtitle, label: Hero subtitle, type: text }
          - { name: datePrompt, label: Date button prompt (no dates yet), type: string }
          - { name: browseButton, label: Browse-gear button, type: string }
      - name: crew
        label: Crew-your-shoot blurb
        type: object
        fields:
          - { name: blurb, label: Crew blurb, type: text }
          - { name: button, label: Button label, type: string }
      - name: cart
        label: Cart UI labels
        type: object
        fields:
          - { name: title, label: Cart title, type: string }
          - { name: dailyTotal, label: Daily-total label, type: string }
          - { name: quoteButton, label: Request-quote button, type: string }
          - { name: emptyMessage, label: Empty-cart message (HTML allowed), type: text }

  - name: formfields
    label: Form input types
    type: file
    path: data/form-fields.json
    fields:
      - name: rental
        label: Rental request form - input type per field
        type: object
        fields:
          - { name: firstName, label: First name, type: select, options: { values: [text, email, number, tel, url] } }
          - { name: lastName,  label: Last name,  type: select, options: { values: [text, email, number, tel, url] } }
          - { name: email,     label: Contact email, type: select, options: { values: [text, email, number, tel, url] } }
          - { name: film,      label: Film / project name, type: select, options: { values: [text, email, number, tel, url] } }
      - name: crew
        label: Crew-your-shoot form - input type per field
        type: object
        fields:
          - { name: first,   label: First name, type: select, options: { values: [text, email, number, tel, url] } }
          - { name: last,    label: Last name,  type: select, options: { values: [text, email, number, tel, url] } }
          - { name: email,   label: Contact email, type: select, options: { values: [text, email, number, tel, url] } }
          - { name: project, label: Project name, type: select, options: { values: [text, email, number, tel, url] } }
          - { name: budget,  label: Budget (number = digits only), type: select, options: { values: [text, email, number, tel, url] } }
          - { name: notes,   label: Notes, type: select, options: { values: [text, email, number, tel, url] } }

  - name: pages
    label: Custom Pages
    type: file
    path: data/pages.json
    fields:
      - name: pages
        label: Custom pages
        type: object
        list: true
        description: "Each entry is a whole page on the studio site. Click 'Add item' at the bottom to make a new one. The page lives at rarepond.com/?p=SLUG (see 'URL slug' below)."
        fields:
          - name: slug
            label: URL slug (lowercase, no spaces - e.g. summer-open-house)
            type: string
            description: "The page's web address. Slug 'summer-open-house' → rarepond.com/?p=summer-open-house. Use letters, numbers and dashes only."
          - name: title
            label: Page title (browser tab + nav fallback)
            type: string
          - name: navLabel
            label: Nav banner label (short - e.g. 'Open House')
            type: string
            description: "What the top-banner link says. Leave blank to use the Page title."
          - name: showInStudioNav
            label: Show in the STUDIO top banner
            type: boolean
            description: "OFF by default. Turn on when the page is ready to be public. The page still works at its URL when this is off - this only controls the banner link."
          - name: showInRentalsNav
            label: Show in the RENTALS top banner
            type: boolean
            description: "Adds a link in the rentals-site banner that jumps across to this page. Independent of the studio toggle."
          - name: navOrder
            label: Nav position (lower number = further left)
            type: number
            description: "Only matters if a nav toggle is on. Our Team/Projects/Contact sit at the start; custom pages are appended in this order."
          - name: background
            label: Page background
            type: select
            options: { values: [home, team, custom] }
            description: "home = the deep-water look from the front page (bubbles optional). team = the light blue 'Meet Rare Pond' look. custom = your own image (set below)."
          - name: bubbles
            label: Show floating bubbles (only applies when background = home)
            type: boolean
          - name: customBg
            label: "Custom background image (only when background = custom)"
            type: image
            description: "SPECS: 2560 x 1440 px or larger, JPG or WebP, under 600 KB. It is scaled to cover the page and centred, so keep anything important away from the outer 10% edges. A darker image reads best - page text is light on 'home', dark on 'team'/'custom'."
          - name: blocks
            label: "Page content blocks - DRAG TO REORDER. The page renders top-to-bottom in this exact order."
            type: object
            list: true
            description: "Add a block, pick its Type, then fill in ONLY the field that Type needs (the others are ignored). Types: image / header / subheader / body / button / form."
            fields:
              - name: type
                label: Block type
                type: select
                options: { values: [image, header, subheader, body, button, form] }
                description: "image → uses 'Image' + 'Image caption'. header/subheader/body → use 'Text'. button → uses the three Button fields. form → uses 'Jotform form ID'."
              - name: text
                label: "Text  (for: header / subheader / body)"
                type: text
                description: "Body text supports blank lines for paragraphs. Basic HTML links are allowed."
              - name: image
                label: "Image  (for: image blocks)"
                type: image
                description: "SPECS: up to 2000 px wide, JPG/PNG/WebP, under 500 KB. Displays full width of the content column with rounded corners."
              - name: caption
                label: "Image caption (optional, for: image blocks)"
                type: string
              - name: buttonLabel
                label: "Button label  (for: button blocks)"
                type: string
              - name: buttonTarget
                label: "Button goes to  (for: button blocks)"
                type: select
                options: { values: [home, team, projects, contact, rentals, page, url] }
                description: "Pick a place on this site. Choose 'page' to link to another custom page, or 'url' for an external link - then fill in the field below."
              - name: buttonUrl
                label: "Button - page slug or external URL"
                type: string
                description: "If 'Button goes to' = page → put the other page's slug here (e.g. summer-open-house). If = url → put the full https:// address."
              - name: jotformId
                label: "Jotform form ID  (for: form blocks)"
                type: string
                description: "Open your form in Jotform. The ID is the long number in the address bar - e.g. jotform.com/build/261817432074052 → paste 261817432074052. Swapping forms later = paste a different ID. Nothing else to do."
              - name: formHeight
                label: "Form height in pixels (optional - default 900)"
                type: number
