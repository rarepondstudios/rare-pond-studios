media:
  input: media
  output: /media
  extensions: [png, jpg, jpeg, webp, gif, svg, mp4]

content:
  - name: site
    label: Site Settings
    type: file
    path: data/site.json
    fields:
      - name: logos
        label: Logos
        type: object
        fields:
          - { name: color, label: Full-color logo (About + footer), type: image }
          - { name: duckMark, label: Duck mark (header icon), type: image }
      - { name: water, label: Water / caustics background, type: image }
      - name: hero
        label: Hero
        type: object
        fields:
          - { name: title, label: Headline, type: string }
          - { name: titleEm, label: Headline accent, type: string }
          - { name: subtitle, label: Subtitle, type: text }
      - name: about
        label: About blurb
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: paragraphs, label: Paragraphs, type: text, list: true }
          - { name: button, label: Button text, type: string }
      - name: socials
        label: Social links
        type: object
        list: true
        fields:
          - { name: label, label: Label, type: string }
          - { name: url, label: URL, type: string }
          - { name: icon, label: Icon, type: select, options: { values: [yt, ig, li] } }
      - { name: orbits, label: About-logo floating images, type: image, list: true }
      - name: header
        label: Header (shared — studio + rentals)
        type: object
        fields:
          - { name: brandLine1, label: Brand — line 1, type: string }
          - { name: brandLine2, label: Brand — line 2 (studio), type: string }
          - { name: navTeam, label: Nav — Team label, type: string }
          - { name: navProjects, label: Nav — Projects label, type: string }
          - { name: navContact, label: Nav — Contact label, type: string }
      - name: sectionHeadings
        label: Section headings (studio)
        type: object
        fields:
          - { name: projectsEyebrow, label: Projects — eyebrow, type: string }
          - { name: projectsHeading, label: Projects — heading, type: string }
          - { name: projectsSub, label: Projects — subtitle, type: text }
          - { name: teamEyebrow, label: Team — eyebrow, type: string }
          - { name: teamHeading, label: Team — heading, type: string }
          - { name: teamSub, label: Team — subtitle, type: text }
          - { name: contactEyebrow, label: Contact — eyebrow, type: string }
          - { name: contactHeading, label: Contact — heading, type: string }
          - { name: contactSub, label: Contact — subtitle, type: text }
      - name: teamCrew
        label: Team page — crew blurb (studio)
        type: object
        fields:
          - { name: blurb, label: Crew blurb, type: text }
          - { name: button, label: Button label, type: string }
      - name: footer
        label: Footer (shared — studio + rentals)
        type: object
        fields:
          - { name: tagline, label: Tagline, type: string }
          - { name: copyrightUrl, label: Copyright link URL, type: string }
          - { name: copyrightUrlText, label: Copyright link text, type: string }
          - { name: copyright, label: Copyright line, type: string }
          - name: links
            label: Footer links
            type: object
            list: true
            fields:
              - { name: label, label: Label, type: string }
              - { name: go, label: In-site target (home/team/projects/contact — blank if external), type: string }
              - { name: href, label: External href (optional), type: string }
      - name: hubspot
        label: Contact form (HubSpot)
        type: object
        fields:
          - { name: portalId, label: Portal ID, type: string }
          - { name: region, label: Region, type: string }
          - { name: formId, label: Form ID, type: string }

  - name: projects
    label: Projects (bubbles + pages)
    type: file
    path: data/projects.json
    fields:
      - name: projects
        label: Projects
        type: object
        list: true
        fields:
          - { name: key, label: ID (url-safe, e.g. geri), type: string }
          - { name: title, label: Title, type: string }
          - { name: subtitle, label: Card subtitle / genre line, type: string }
          - { name: theme, label: Theme, type: select, options: { values: [geri, rev, invalid] } }
          - { name: placeholder, label: Coming-soon placeholder bubble, type: boolean }
          - { name: bubbleImage, label: Bubble image, type: image }
          - { name: titleLogo, label: Title logo (transparent PNG), type: image }
          - { name: focusBg, label: Feature / page background, type: image }
          - { name: cardLogline, label: Carousel logline, type: text }
          - { name: logoText, label: Placeholder text, type: string }
          - { name: eyebrow, label: Eyebrow, type: string }
          - { name: kicker, label: Kicker, type: string }
          - { name: pageTitle, label: Project-page title (optional), type: string }
          - { name: tagline, label: Tagline, type: string }
          - { name: pageLogline, label: Project-page logline (HTML allowed), type: text }
          - { name: chips, label: Genre chips, type: string, list: true }
          - name: watch
            label: Where to watch
            type: object
            fields:
              - { name: type, label: Type, type: select, options: { values: [festival, post, youtube] } }
              - { name: text, label: Status text, type: string }
              - { name: id, label: YouTube video ID, type: string }
              - { name: url, label: YouTube URL, type: string }
              - { name: ig, label: Instagram handle, type: string }
          - { name: stills, label: Stills gallery, type: image, list: true }
          - { name: credits, label: Credits (HTML allowed), type: text }
          - { name: blurb, label: Short blurb, type: text }

  - name: team
    label: Team
    type: file
    path: data/team.json
    fields:
      - name: team
        label: Team members
        type: object
        list: true
        fields:
          - { name: name, label: Name, type: string }
          - { name: role, label: Role, type: string }
          - { name: photo, label: Photo, type: image }
          - { name: desc, label: Bio, type: text }

  - name: rentals
    label: Rentals page
    type: file
    path: data/rentals.json
    fields:
      - { name: seoDescription, label: SEO description (search-result blurb), type: text }
      - { name: brandLine1, label: Header brand — line 1, type: string }
      - { name: brandLine2, label: Header brand — line 2 (rentals), type: string }
      - { name: cartEstimateNote, label: Cart estimate note, type: text }
      - name: logos
        label: Rentals logos
        type: object
        fields:
          - { name: headerMark, label: Header duck mark, type: image }
          - { name: footerColor, label: Footer full-color logo, type: image }
          - { name: footerWater, label: Footer water / caustics background, type: image }
          - { name: homeLogo, label: Home hero logo, type: image }
      - name: home
        label: Home hero copy
        type: object
        fields:
          - { name: heroTitle, label: Hero title, type: string }
          - { name: heroSubtitle, label: Hero subtitle, type: text }
          - { name: datePrompt, label: Date button prompt (no dates yet), type: string }
          - { name: browseButton, label: Browse-gear button, type: string }
      - name: crew
        label: Crew-your-shoot blurb
        type: object
        fields:
          - { name: blurb, label: Crew blurb, type: text }
          - { name: button, label: Button label, type: string }
      - name: cart
        label: Cart UI labels
        type: object
        fields:
          - { name: title, label: Cart title, type: string }
          - { name: dailyTotal, label: Daily-total label, type: string }
          - { name: quoteButton, label: Request-quote button, type: string }
          - { name: emptyMessage, label: Empty-cart message (HTML allowed), type: text }

  - name: formfields
    label: Form input types
    type: file
    path: data/form-fields.json
    fields:
      - name: rental
        label: Rental request form — input type per field
        type: object
        fields:
          - { name: firstName, label: First name, type: select, options: { values: [text, email, number, tel, url] } }
          - { name: lastName,  label: Last name,  type: select, options: { values: [text, email, number, tel, url] } }
          - { name: email,     label: Contact email, type: select, options: { values: [text, email, number, tel, url] } }
          - { name: film,      label: Film / project name, type: select, options: { values: [text, email, number, tel, url] } }
      - name: crew
        label: Crew-your-shoot form — input type per field
        type: object
        fields:
          - { name: first,   label: First name, type: select, options: { values: [text, email, number, tel, url] } }
          - { name: last,    label: Last name,  type: select, options: { values: [text, email, number, tel, url] } }
          - { name: email,   label: Contact email, type: select, options: { values: [text, email, number, tel, url] } }
          - { name: project, label: Project name, type: select, options: { values: [text, email, number, tel, url] } }
          - { name: budget,  label: Budget (number = digits only), type: select, options: { values: [text, email, number, tel, url] } }
          - { name: notes,   label: Notes, type: select, options: { values: [text, email, number, tel, url] } }
